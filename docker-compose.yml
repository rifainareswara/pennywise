services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pennywise}
      POSTGRES_USER: ${POSTGRES_USER:-pennywise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pennywise}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pennywise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pennywise}:${POSTGRES_PASSWORD:-pennywise}@db:5432/${POSTGRES_DB:-pennywise}
      JWT_SECRET: ${JWT_SECRET:-pennywise-dev-secret-change-in-production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      FRONTEND_URL: http://localhost:5173
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost:5173}

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}"
    environment:
      PORT: ${FRONTEND_PORT:-5173}
      BACKEND_URL: http://backend:3000
      VITE_API_URL: ${VITE_API_URL:-/api}

volumes:
  pgdata:
