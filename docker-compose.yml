services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pennywise}
      POSTGRES_USER: ${POSTGRES_USER:-pennywise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pennywise}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pennywise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pennywise}:${POSTGRES_PASSWORD:-pennywise}@db:5432/${POSTGRES_DB:-pennywise}
      JWT_SECRET: ${JWT_SECRET:-pennywise-dev-secret-change-in-production}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      FRONTEND_URL: http://localhost:5173

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api

volumes:
  pgdata:
